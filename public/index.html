<script>
async function loadEntries() {
  const log = document.getElementById('log');
  log.innerHTML = 'Loading...';

  try {
    const res = await fetch('/api/get-entries');
    const entries = await res.json();

    if (!Array.isArray(entries) || !entries.length) {
      log.innerHTML = '<p>No entries yet.</p>';
      return;
    }

    log.innerHTML = entries.map(entry => `
      <div style="border:1px solid #ccc; padding:12px; margin:8px 0;">
        <strong>${entry.food}</strong><br>
        Portion: ${entry.portion}<br>
        Calories: ${entry.calories}<br>
        Protein: ${entry.protein_g ?? entry.protein ?? 0}g<br>
        Carbs: ${entry.carbs_g ?? entry.carbs ?? 0}g<br>
        Fat: ${entry.fat_g ?? entry.fat ?? 0}g<br>
        <small>${entry.timestamp}</small>
      </div>
    `).join('');
  } catch (err) {
    log.innerHTML = `<p style="color:red;">Failed to load entries: ${err.message}</p>`;
  }
}

async function logFood() {
  const inputEl = document.getElementById('foodInput');
  const log = document.getElementById('log');
  const input = inputEl.value.trim();

  if (!input) return;

  try {
    const res = await fetch('/api/log-food', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Failed to log food');
    }

    inputEl.value = '';
    await loadEntries();
  } catch (err) {
    log.innerHTML = `<p style="color:red;">${err.message}</p>`;
  }
}

loadEntries();
</script>
